# =========================
# Experiment configuration
# =========================

experiment:
  name: "vae_inverse_default"
  seed: 42
  device: "cuda"        # "cuda" or "cpu"
  output_dir: "results/runs"

# =========================
# Dataset
# =========================

dataset:
  name: "biomedical_images"
  data_root: "data/processed"
  image_size: 128
  channels: 1           # 1 = grayscale, 3 = RGB
  train_fraction: 0.8
  val_fraction: 0.1
  test_fraction: 0.1

# =========================
# Forward operator F(x)
# =========================

operator:
  type: "blur_downsample_gaussian"

  blur:
    kernel_size: 9
    sigma: 1.5

  downsample:
    factor: 2

  noise:
    type: "gaussian"
    sigma: 0.01

# =========================
# VAE model
# =========================

model:
  latent_dim: 64
  hidden_dims: [32, 64, 128, 256]
  use_batchnorm: true

# =========================
# Training
# =========================

training:
  batch_size: 32
  num_epochs: 100
  learning_rate: 1e-3
  beta_kl: 1.0

  # Optional physics-consistency loss
  consistency:
    enabled: false
    weight: 1.0

# =========================
# Evaluation
# =========================

evaluation:
  num_samples_uq: 20        # posterior samples per input
  stability_noise_sigma: 0.005
  metrics:
    - psnr
    - ssim

# =========================
# Logging
# =========================

logging:
  save_checkpoints: true
  checkpoint_interval: 10
  verbose: true
